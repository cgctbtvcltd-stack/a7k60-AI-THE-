<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng 8/3 - Tường Vy</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS: Thiết kế giao diện */
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom right, #1a0b2e, #4b134f, #1a0b2e); 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            font-family: 'Dancing Script', cursive;
        }

        /* --- Sân khấu Trái tim & Hoa bướm --- */
        .heart-scene {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            z-index: 5;
        }

        .svg-heart {
            fill: #e81176;
            filter: drop-shadow(0 0 15px #ff69b4) drop-shadow(0 0 30px #ff69b4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .flower-ornament { position: absolute; font-size: 1.5rem; opacity: 0.9; }
        .f1 { top: -10%; left: -10%; }
        .f2 { top: 30%; right: -20%; }
        .f3 { bottom: -20%; left: 50%; }
        .f4 { top: 70%; left: -25%; }

        .butterfly-ornament {
            position: absolute;
            font-size: 2rem;
            animation: butterfly-bay 10s linear infinite;
        }

        @keyframes butterfly-bay {
            0% { transform: translate(120px, 0px) rotate(0deg); }
            25% { transform: translate(0px, 120px) rotate(90deg); }
            50% { transform: translate(-120px, 0px) rotate(180deg); }
            75% { transform: translate(0px, -120px) rotate(270deg); }
            100% { transform: translate(120px, 0px) rotate(360deg); }
        }

        /* --- Vùng Chữ --- */
        .text-container {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .line1 {
            font-size: 3rem;
            color: #ffb6c1; 
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.8);
            margin-bottom: 5px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
        }

        .line2 {
            font-size: 5rem;
            color: #ff9a9e;
            text-shadow: 0 0 20px #ff9a9e, 0 0 40px #fecfef; 
            font-weight: 700;
            margin-bottom: 20px;
        }

        .letter {
            opacity: 0;
            display: inline-block;
            transform: translateY(20px) scale(0.8);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --- Lời chúc bày tỏ tình cảm --- */
        .message-box {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1.6;
            color: #fdfdfd;
            max-width: 600px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease, transform 2s ease;
        }

        .message-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Hiệu ứng cánh hoa rơi nền --- */
        .petal {
            position: absolute;
            top: -10vh;
            color: rgba(255, 182, 193, 0.7);
            user-select: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* --- Hiệu ứng Hoa nở từ dưới (Đã sửa lỗi) --- */
        .bottom-flowers {
            position: fixed;
            bottom: 10px; /* Đẩy lên cao hơn để nhìn rõ */
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-evenly; /* Dàn đều hoa ra khắp viền dưới */
            align-items: flex-end;
            pointer-events: none;
            z-index: 20;
        }

        .blooming-flower {
            font-size: 3.5rem; /* Tăng kích thước hoa */
            opacity: 0;
            transform: translateY(80px) scale(0.3); /* Bắt đầu từ dưới thấp và nhỏ */
            transition: opacity 2s ease, transform 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.5));
        }

        /* Khi được kích hoạt, hoa sẽ nổi lên và to ra */
        .bottom-flowers.visible .blooming-flower {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .heart-scene { width: 100px; height: 100px; margin-bottom: 10px; }
            .line1 { font-size: 1.5rem; }
            .line2 { font-size: 2.5rem; }
            .message-box { font-size: 1rem; padding: 0 10px; }
            .blooming-flower { font-size: 2.5rem; } /* Chỉnh hoa nhỏ lại một chút trên điện thoại */
        }
    </style>
</head>
<body>

    <div class="heart-scene">
        <svg class="svg-heart" viewBox="0 0 500 500" width="100%" height="100%">
            <path d="M250 100 C180 0, 0 80, 0 210 C0 300, 150 420, 250 480 C350 420, 500 300, 500 210 C500 80, 320 0, 250 100 Z" />
        </svg>
        <span class="flower-ornament f1">🌸</span>
        <span class="flower-ornament f2">🌹</span>
        <span class="flower-ornament f3">🌷</span>
        <span class="flower-ornament f4">🌺</span>
        <span class="butterfly-ornament b1">🦋</span>
    </div>

    <div class="text-container">
        <div id="line1" class="line1"></div>
        <div id="line2" class="line2"></div>
        <div id="messageBox" class="message-box">
            "Cảm ơn em vì đã đến bên anh và làm cho thế giới này trở nên rực rỡ hơn. Chúc người con gái anh yêu luôn luôn xinh đẹp, ngập tràn hạnh phúc và bình an. Anh yêu em!"
        </div>
    </div>

    <div id="bottomFlowers" class="bottom-flowers">
        <span class="blooming-flower" style="transition-delay: 0.2s;">🌺</span>
        <span class="blooming-flower" style="transition-delay: 0.6s;">🌻</span>
        <span class="blooming-flower" style="transition-delay: 1.0s;">🌷</span>
        <span class="blooming-flower" style="transition-delay: 0.4s;">🌸</span>
        <span class="blooming-flower" style="transition-delay: 1.2s;">🌹</span>
        <span class="blooming-flower" style="transition-delay: 0.8s;">🌺</span>
        <span class="blooming-flower" style="transition-delay: 0.3s;">🌻</span>
        <span class="blooming-flower" style="transition-delay: 0.9s;">🌷</span>
    </div>

    <script>
        const text1 = "Chúc mừng ngày 8/3";
        const text2 = "Lê Nguyễn Tường Vy";

        function animateText(text, elementId, delayOffset) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.className = 'letter';
                span.style.transitionDelay = `${delayOffset + (i * 0.12)}s`;
                
                if (text[i] === ' ') {
                    span.innerHTML = '&nbsp;';
                } else {
                    span.innerText = text[i];
                }
                container.appendChild(span);
            }

            setTimeout(() => {
                const letters = container.querySelectorAll('.letter');
                letters.forEach(letter => letter.classList.add('visible'));
            }, 50);
        }

        // --- Bắt đầu chạy hiệu ứng ---
        animateText(text1, 'line1', 0);
        const timeForLine1 = text1.length * 0.12;
        animateText(text2, 'line2', timeForLine1 + 0.3);

        const totalTimeForNames = timeForLine1 + 0.3 + (text2.length * 0.12);
        
        // Hiện lời chúc
        setTimeout(() => {
            document.getElementById('messageBox').classList.add('visible');
        }, (totalTimeForNames + 0.5) * 1000); 

        // Hiện dải hoa nở từ dưới lên
        setTimeout(() => {
            document.getElementById('bottomFlowers').classList.add('visible');
        }, (totalTimeForNames + 1) * 1000); 

        // Hiệu ứng cánh hoa rơi nền
        function createPetal() {
            const petal = document.createElement('div');
            const shapes = ['🌸', '💖', '✨']; 
            petal.innerHTML = shapes[Math.floor(Math.random() * shapes.length)];
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 5 + 6 + 's';
            petal.style.fontSize = Math.random() * 1.2 + 0.5 + 'rem';
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 12000);
        }
        setInterval(createPetal, 400);
    </script>

</body>
</html>
